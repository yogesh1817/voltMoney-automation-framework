# Browser Configuration
browser=chrome
headless=false

# Timeout Settings (in seconds)
implicit.wait=10
explicit.wait=30
page.load.timeout=60

# Application URLs
base.url=https://voltmoney.in/check-loan-eligibility-against-mutual-funds
environment=prod

# File Paths
screenshot.path=screenshots/
report.path=reports/
test.data.path=src/test/resources/testdata/

# Reporting Configuration
report.title=Volt Money Automation Test Report
report.name=Eligibility Page Test Results

# Selenium Grid Configuration (Optional)
use.selenium.grid=false
grid.url=http://localhost:4444/wd/hub

# Performance Test Settings
max.response.time.ms=5000
load.test.users=10
load.test.duration.seconds=60

# Retry Configuration
retry.failed.tests=true
max.retry.count=2

# Screenshot Configuration
capture.screenshot.on.failure=true
capture.screenshot.on.pass=false

# Logging Configuration
log.level=INFO
log.file.path=logs/automation.log

# Cross-Browser Test Configuration
test.browsers=chrome,firefox,edge
parallel.execution=true
thread.count=3

# Mobile Testing Configuration
test.mobile.devices=true
mobile.devices=iPhone 12,Samsung Galaxy S21,iPad

# Network Conditions Testing
test.network.conditions=false
network.conditions=Fast 3G,Slow 3G,2G

# Accessibility Testing
accessibility.testing.enabled=false
min.color.contrast.ratio=4.5

# Security Testing
security.testing.enabled=false
test.xss.inputs=true
test.sql.injection=true